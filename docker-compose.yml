services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todobot
      POSTGRES_USER: todobot
      POSTGRES_PASSWORD: todobot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./internal/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://todobot:todobot@postgres:5432/todobot
      WHISPER_ENDPOINT: http://host.docker.internal:8080
      WEB_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
