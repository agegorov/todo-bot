<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Board</title>
  <style>
    /* ── Темы ── */
    :root{
      --bg:#0f1117;--bg2:#1a1d2e;--bg3:#252840;--bg4:#13162a;
      --border:#2d3148;--border2:#3d4166;
      --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#4a5280;
      --accent:#a78bfa;--accent2:#8b5cf6;
      --drag-over:#1e2240;--drag-border:#4f547a;
      --card-shadow:#00000040;
      --badge-proj-bg:#1e2240;--badge-proj-color:#64748b;
      --badge-dl-bg:#1e3a5f;--badge-dl-color:#60a5fa;
      --badge-del-bg:#2d1f3b;--badge-del-color:#c084fc;
      --badge-tag-bg:#1e2a1e;--badge-tag-color:#4ade80;
    }
    [data-theme="light"]{
      --bg:#f0f2f8;--bg2:#ffffff;--bg3:#f7f8fc;--bg4:#e8eaf4;
      --border:#d1d5e8;--border2:#b8bdd8;
      --text:#1e2240;--text2:#4a5280;--text3:#6b7494;--text4:#9099bb;
      --accent:#7c3aed;--accent2:#6d28d9;
      --drag-over:#ede9fe;--drag-border:#7c3aed;
      --card-shadow:#00000018;
      --badge-proj-bg:#ede9fe;--badge-proj-color:#4a5280;
      --badge-dl-bg:#dbeafe;--badge-dl-color:#1d4ed8;
      --badge-del-bg:#f3e8ff;--badge-del-color:#7c3aed;
      --badge-tag-bg:#dcfce7;--badge-tag-color:#16a34a;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:auto;transition:background .2s,color .2s}

    /* ── Header ── */
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
    header h1{font-size:17px;font-weight:700;color:var(--accent);white-space:nowrap}
    .header-right{display:flex;align-items:center;gap:10px}
    .add-form{display:flex;gap:8px;flex:1;max-width:520px;margin:0 20px}
    .add-form input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 13px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
    .add-form input:focus{border-color:var(--accent)}
    .add-form input::placeholder{color:var(--text4)}
    .btn{background:var(--accent);border:none;border-radius:8px;padding:7px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
    .btn:hover{background:var(--accent2)}
    .btn.secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
    .btn.secondary:hover{background:var(--bg4);color:var(--text)}

    /* ── Theme toggle ── */
    .theme-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--text2);font-size:15px;cursor:pointer;transition:all .15s;line-height:1}
    .theme-btn:hover{background:var(--bg3);color:var(--text)}

    /* ── User info ── */
    .user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
    .user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)}
    .user-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .logout-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s}
    .logout-btn:hover{border-color:#f87171;color:#f87171}
    .link-tg-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .link-tg-btn:hover{border-color:#60a5fa;color:#60a5fa}
    .link-tg-modal .modal{width:380px;text-align:center}
    .link-tg-modal .token-box{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px;font-size:22px;font-weight:700;letter-spacing:3px;color:var(--accent);margin:16px 0;font-family:monospace}
    .link-tg-modal .cmd-box{background:var(--bg4);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text2);font-family:monospace;cursor:pointer;transition:background .15s;margin-bottom:6px}
    .link-tg-modal .cmd-box:hover{background:var(--bg3)}
    .link-tg-modal .hint{font-size:12px;color:var(--text4);line-height:1.5}
    .tg-linked{font-size:12px;color:#4ade80;display:flex;align-items:center;gap:4px}

    /* ── Toolbar ── */
    .toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--bg4);border-bottom:1px solid var(--border);flex-wrap:wrap}
    .view-toggle{display:flex;background:var(--bg3);border-radius:8px;padding:3px;gap:2px}
    .view-btn{background:none;border:none;padding:5px 12px;border-radius:6px;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
    .view-btn.active{background:var(--border2);color:var(--text)}
    .tag-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1}
    .tag-filter-label{font-size:11px;color:var(--text4);font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
    .tag-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
    .tag-chip:hover{border-color:var(--accent);color:var(--accent)}
    .tag-chip.active{background:var(--badge-del-bg);border-color:var(--accent);color:var(--accent)}
    .tag-chip.clear{color:#f87171;border-color:#f87171}
    .tag-chip.clear:hover{background:#3b1f1f;color:#fca5a5}

    /* ── Board ── */
    .board{display:flex;gap:14px;padding:20px;align-items:flex-start;min-height:calc(100vh - 113px)}
    .tags-view{padding:20px;min-height:calc(100vh - 113px)}
    .tag-group{margin-bottom:24px}
    .tag-group-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .tag-group-name{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
    .tag-group-count{font-size:11px;background:var(--bg3);border-radius:20px;padding:1px 7px;color:var(--text4)}
    .tag-group-cards{display:flex;flex-wrap:wrap;gap:10px}

    /* ── Column ── */
    .column{background:var(--bg2);border-radius:12px;width:284px;min-width:284px;display:flex;flex-direction:column;max-height:calc(100vh - 153px);border:2px solid transparent;transition:border-color .2s,background .2s}
    .column.drag-over{border-color:var(--drag-border);background:var(--drag-over)}
    .column.col-dragging{opacity:.5}
    .col-header{display:flex;align-items:center;gap:8px;padding:12px 12px 10px;border-bottom:1px solid var(--border);cursor:grab}
    .col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .col-title{flex:1;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);outline:none;background:transparent;border:none;cursor:text;min-width:0}
    .col-title:focus{color:var(--text)}
    .col-count{font-size:11px;background:var(--bg3);border-radius:20px;padding:1px 7px;color:var(--text4)}
    .col-menu{position:relative}
    .col-menu-btn{background:none;border:none;color:var(--text4);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s}
    .col-menu-btn:hover{color:var(--text)}
    .dropdown{position:absolute;top:22px;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;min-width:140px;z-index:100;display:none;overflow:hidden}
    .dropdown.open{display:block}
    .dropdown button{display:block;width:100%;background:none;border:none;padding:8px 14px;text-align:left;color:var(--text2);font-size:13px;cursor:pointer;transition:background .15s}
    .dropdown button:hover{background:var(--bg4);color:var(--text)}
    .dropdown button.del:hover{color:#f87171}

    /* ── Cards ── */
    .cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
    .cards::-webkit-scrollbar{width:3px}
    .cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .drop-hint{min-height:44px;border-radius:8px;border:2px dashed transparent;transition:all .2s}
    .drop-hint.active{border-color:var(--drag-border);background:var(--drag-over)}
    .empty-state{text-align:center;color:var(--border2);font-size:12px;padding:16px 0}

    .card{background:var(--bg3);border-radius:9px;padding:11px;cursor:grab;border:1px solid transparent;transition:border-color .15s,box-shadow .15s;position:relative}
    .card:hover{border-color:var(--border2);box-shadow:0 2px 8px var(--card-shadow)}
    .card.dragging{opacity:.45;transform:rotate(1.5deg)}
    .card-title{font-size:13px;font-weight:500;line-height:1.45;margin-bottom:7px;padding-right:44px;color:var(--text)}
    .card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .badge{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:500}
    .badge-proj{background:var(--badge-proj-bg);color:var(--badge-proj-color)}
    .badge-dl{background:var(--badge-dl-bg);color:var(--badge-dl-color)}
    .badge-dl.overdue{background:#3b1f1f;color:#f87171}
    [data-theme="light"] .badge-dl.overdue{background:#fee2e2;color:#dc2626}
    .badge-del{background:var(--badge-del-bg);color:var(--badge-del-color)}
    .badge-tag{background:var(--badge-tag-bg);color:var(--badge-tag-color);cursor:pointer}
    .badge-tag:hover{opacity:.8}
    .badge-col{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}
    .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .p1{background:#f87171}.p2{background:#fbbf24}.p3{background:#4ade80}
    .card-del,.card-edit{position:absolute;background:none;border:none;font-size:13px;cursor:pointer;display:none;transition:color .15s}
    .card-del{top:7px;right:7px;color:var(--border2)}
    .card-edit{top:7px;right:26px;color:var(--border2)}
    .card:hover .card-del,.card:hover .card-edit{display:block}
    .card-del:hover{color:#f87171}
    .card-edit:hover{color:var(--accent)}
    .tag-group-cards .card{width:260px;cursor:default}

    /* ── Add column ── */
    .add-col-btn{background:var(--bg2);border:2px dashed var(--border);border-radius:12px;width:220px;min-width:220px;height:60px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text4);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0;align-self:flex-start}
    .add-col-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--drag-over)}

    /* ── Modals ── */
    .modal-bg{position:fixed;inset:0;background:#00000080;display:none;align-items:center;justify-content:center;z-index:200}
    .modal-bg.open{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:340px}
    .modal h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text)}
    .modal input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
    .modal input:focus{border-color:var(--accent)}
    .modal-colors{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .modal-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
    .modal-swatch:hover,.modal-swatch.active{border-color:var(--text)}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .edit-modal .modal{width:420px}
    .edit-modal label{display:block;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
    .edit-modal .field{margin-bottom:14px}
    .edit-modal input,.edit-modal textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;resize:vertical}
    .edit-modal input:focus,.edit-modal textarea:focus{border-color:var(--accent)}
    .priority-btns{display:flex;gap:6px}
    .priority-btn{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:6px;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
    .priority-btn.active-1{background:#3b1f1f;border-color:#f87171;color:#f87171}
    .priority-btn.active-2{background:#2d2510;border-color:#fbbf24;color:#fbbf24}
    .priority-btn.active-3{background:#1a2e1a;border-color:#4ade80;color:#4ade80}
    [data-theme="light"] .priority-btn.active-1{background:#fee2e2;border-color:#f87171;color:#dc2626}
    [data-theme="light"] .priority-btn.active-2{background:#fef3c7;border-color:#fbbf24;color:#d97706}
    [data-theme="light"] .priority-btn.active-3{background:#dcfce7;border-color:#4ade80;color:#16a34a}
    .tags-input-wrap{display:flex;flex-wrap:wrap;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;cursor:text;transition:border-color .2s}
    .tags-input-wrap:focus-within{border-color:var(--accent)}
    .tag-pill{display:flex;align-items:center;gap:4px;background:var(--badge-del-bg);border-radius:20px;padding:2px 8px;font-size:12px;color:var(--accent)}
    .tag-pill button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;line-height:1;padding:0}
    .tag-pill button:hover{color:#f87171}
    .tags-input{background:none;border:none;outline:none;color:var(--text);font-size:13px;min-width:80px;flex:1}

    /* ── Toast ── */
    .toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:13px;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;z-index:300;color:var(--text)}
    .toast.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>

<header>
  <h1>📋 Todo Board</h1>
  <form class="add-form" id="addForm">
    <input id="taskInput" placeholder="Новая задача — 'ревью PR до пятницы #работа срочно'" autocomplete="off">
    <button class="btn" type="submit">+ Задача</button>
  </form>
  <div class="header-right">
    <div class="user-info" id="userInfo" style="display:none">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <span class="user-name" id="userName"></span>
      <span class="tg-linked" id="tgLinked" style="display:none" title="Telegram привязан">✅ TG</span>
      <button class="link-tg-btn" id="linkTgBtn" style="display:none">🔗 Привязать Telegram</button>
      <a href="/auth/logout" class="logout-btn">Выйти</a>
    </div>
    <button class="theme-btn" id="themeBtn" title="Сменить тему">🌙</button>
  </div>
</header>

<div class="toolbar">
  <div class="view-toggle">
    <button class="view-btn active" data-view="columns">⬛ Колонки</button>
    <button class="view-btn" data-view="tags">🏷 По тегам</button>
  </div>
  <div class="tag-filters" id="tagFilters"></div>
</div>

<div id="boardWrap"></div>

<!-- Modal -->
<div class="modal-bg" id="colModal">
  <div class="modal">
    <h2 id="modalTitle">Новая колонка</h2>
    <input id="colName" placeholder="Название" maxlength="40">
    <div class="modal-colors" id="modalColors"></div>
    <div class="modal-actions">
      <button class="btn secondary" id="modalCancel">Отмена</button>
      <button class="btn" id="modalSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Edit task modal -->
<div class="modal-bg edit-modal" id="editModal">
  <div class="modal">
    <h2>Редактировать задачу</h2>
    <div class="field">
      <label>Название</label>
      <input id="editTitle" placeholder="Название задачи">
    </div>
    <div class="field">
      <label>Заметки</label>
      <textarea id="editNotes" rows="2" placeholder="Дополнительно..."></textarea>
    </div>
    <div class="field">
      <label>Приоритет</label>
      <div class="priority-btns">
        <button class="priority-btn" data-p="1">🔴 Высокий</button>
        <button class="priority-btn" data-p="2">🟡 Средний</button>
        <button class="priority-btn" data-p="3">🟢 Низкий</button>
      </div>
    </div>
    <div class="field">
      <label>Дедлайн</label>
      <input type="datetime-local" id="editDeadline">
    </div>
    <div class="field">
      <label>Теги</label>
      <div class="tags-input-wrap" id="tagsWrap">
        <input class="tags-input" id="tagsInput" placeholder="Введи тег и нажми Enter">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="editCancel">Отмена</button>
      <button class="btn" id="editSave">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Link Telegram modal -->
<div class="modal-bg link-tg-modal" id="linkTgModal">
  <div class="modal">
    <h2>🔗 Привязать Telegram</h2>
    <p style="font-size:13px;color:var(--text3);margin-bottom:4px">Отправь эту команду боту:</p>
    <div class="cmd-box" id="linkCmd" title="Нажми чтобы скопировать"></div>
    <div class="hint">Токен действителен <b>15 минут</b>.<br>После отправки команды задачи из бота появятся на доске.</div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn secondary" id="linkTgClose">Закрыть</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
const COLORS = ['#94a3b8','#60a5fa','#4ade80','#f87171','#fbbf24','#a78bfa','#f472b6','#34d399','#fb923c','#38bdf8'];

// ── Theme ─────────────────────────────────────────────────────────────────────
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'dark';
applyTheme(theme);

function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', t);
}

themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
let dragTaskId = null, dragColId = null;
let state = { columns: [], tasks: [] };
let modalMode = null, modalEditId = null, selectedColor = COLORS[0];
let currentView = 'columns';   // 'columns' | 'tags'
let activeTag = null;           // выбранный тег для фильтра

// ── Data ─────────────────────────────────────────────────────────────────────

async function load() {
  const [cols, tasks] = await Promise.all([
    fetch(`${API}/columns`).then(r => r.json()),
    fetch(`${API}/tasks`).then(r => r.json()),
  ]);
  state = { columns: Array.isArray(cols) ? cols : [], tasks: Array.isArray(tasks) ? tasks : [] };
  renderTagFilters();
  render();
}

// ── Tag filters bar ───────────────────────────────────────────────────────────

function renderTagFilters() {
  const all = new Set();
  state.tasks.forEach(t => (t.tags || []).forEach(tag => all.add(tag)));
  const tags = [...all].sort();

  const el = document.getElementById('tagFilters');
  if (!tags.length) { el.innerHTML = ''; return; }

  el.innerHTML = `<span class="tag-filter-label">Теги:</span>` +
    tags.map(tag =>
      `<span class="tag-chip${activeTag === tag ? ' active' : ''}" data-tag="${esc(tag)}">#${esc(tag)}</span>`
    ).join('') +
    (activeTag ? `<span class="tag-chip clear" data-tag="">✕ сбросить</span>` : '');

  el.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeTag = chip.dataset.tag || null;
      renderTagFilters();
      render();
    });
  });
}

// ── View toggle ───────────────────────────────────────────────────────────────

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentView = btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── Render ───────────────────────────────────────────────────────────────────

function render() {
  if (currentView === 'columns') renderColumns();
  else renderTagsView();
}

function filteredTasks() {
  if (!activeTag) return state.tasks;
  return state.tasks.filter(t => (t.tags || []).includes(activeTag));
}

// ── Columns view ──────────────────────────────────────────────────────────────

function renderColumns() {
  const wrap = document.getElementById('boardWrap');
  wrap.innerHTML = '';
  const board = document.createElement('div');
  board.className = 'board';
  const tasks = filteredTasks();
  state.columns.forEach(col => board.appendChild(makeColumn(col, tasks)));
  board.appendChild(makeAddColBtn());
  wrap.appendChild(board);
}

function makeColumn(col, tasks) {
  const colTasks = tasks.filter(t => t.column_id === col.id);
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.colId = col.id;

  const sysIcon = col.is_system ? '<span title="Системная колонка — не удаляется" style="font-size:11px;opacity:.6">🔒</span>' : '';
  const delBtn = col.is_system ? '' : '<button data-action="del" class="del">🗑 Удалить</button>';

  el.innerHTML = `
    <div class="col-header" draggable="true">
      <span class="col-dot" style="background:${col.color}"></span>
      <div class="col-title" contenteditable="true" spellcheck="false">${esc(col.name)}</div>
      ${sysIcon}
      <span class="col-count">${colTasks.length}</span>
      <div class="col-menu">
        <button class="col-menu-btn">⋯</button>
        <div class="dropdown">
          <button data-action="edit">✏️ Переименовать</button>
          ${delBtn}
        </div>
      </div>
    </div>
    <div class="cards" data-col="${col.id}">
      ${colTasks.length === 0 ? '<div class="empty-state">Нет задач</div>' : ''}
      ${colTasks.map(t => makeCardHTML(t, false)).join('')}
      <div class="drop-hint"></div>
    </div>`;

  // Rename inline
  const titleEl = el.querySelector('.col-title');
  titleEl.addEventListener('blur', async () => {
    const name = titleEl.textContent.trim();
    if (!name || name === col.name) return;
    await fetch(`${API}/columns/${col.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, color: col.color}) });
    col.name = name;
  });
  titleEl.addEventListener('keydown', e => { if (e.key==='Enter'){e.preventDefault();titleEl.blur();} });

  // Dropdown
  const menuBtn = el.querySelector('.col-menu-btn');
  const dropdown = el.querySelector('.dropdown');
  menuBtn.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.toggle('open'); });
  document.addEventListener('click', () => dropdown.classList.remove('open'));
  dropdown.querySelector('[data-action="edit"]').addEventListener('click', () => openModal('edit', col));
  const delBtnEl = dropdown.querySelector('[data-action="del"]');
  if (delBtnEl) delBtnEl.addEventListener('click', () => deleteColumn(col));

  // Column drag
  const header = el.querySelector('.col-header');
  header.addEventListener('dragstart', e => { dragColId = col.id; e.dataTransfer.effectAllowed='move'; setTimeout(()=>el.classList.add('col-dragging'),0); });
  header.addEventListener('dragend', () => { el.classList.remove('col-dragging'); dragColId = null; });

  el.addEventListener('dragover', e => {
    e.preventDefault();
    if (dragColId && dragColId !== col.id) el.classList.add('drag-over');
    else if (dragTaskId) { el.classList.add('drag-over'); el.querySelector('.drop-hint').classList.add('active'); }
  });
  el.addEventListener('dragleave', e => {
    if (!el.contains(e.relatedTarget)) { el.classList.remove('drag-over'); el.querySelector('.drop-hint')?.classList.remove('active'); }
  });
  el.addEventListener('drop', async e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    el.querySelector('.drop-hint')?.classList.remove('active');
    if (dragTaskId) {
      await fetch(`${API}/tasks/${dragTaskId}/column`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({column_id: col.id}) });
      load();
    } else if (dragColId && dragColId !== col.id) {
      const a = state.columns.find(c=>c.id===dragColId), b = col;
      await Promise.all([
        fetch(`${API}/columns/${a.id}/position`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({position:b.position})}),
        fetch(`${API}/columns/${b.id}/position`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({position:a.position})}),
      ]);
      load();
    }
  });

  // Card events
  el.querySelectorAll('.card').forEach(card => bindCardEvents(card));
  return el;
}

// ── Tags view ─────────────────────────────────────────────────────────────────

function renderTagsView() {
  const wrap = document.getElementById('boardWrap');
  wrap.innerHTML = '';
  const view = document.createElement('div');
  view.className = 'tags-view';

  const tasks = filteredTasks();
  const tagMap = new Map(); // tag → tasks[]

  // Задачи без тегов
  const untagged = tasks.filter(t => !t.tags || t.tags.length === 0);

  tasks.forEach(t => {
    (t.tags || []).forEach(tag => {
      if (!tagMap.has(tag)) tagMap.set(tag, []);
      tagMap.get(tag).push(t);
    });
  });

  if (!tagMap.size && !untagged.length) {
    view.innerHTML = '<div style="text-align:center;color:#2d3148;padding:60px 0;font-size:14px">Нет задач с тегами</div>';
    wrap.appendChild(view);
    return;
  }

  // Рендерим группы по тегам
  [...tagMap.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([tag, tagTasks]) => {
    view.appendChild(makeTagGroup(`#${tag}`, tagTasks));
  });

  if (untagged.length) {
    view.appendChild(makeTagGroup('Без тега', untagged));
  }

  wrap.appendChild(view);
}

function makeTagGroup(name, tasks) {
  const group = document.createElement('div');
  group.className = 'tag-group';
  group.innerHTML = `
    <div class="tag-group-header">
      <span class="tag-group-name">${esc(name)}</span>
      <span class="tag-group-count">${tasks.length}</span>
    </div>
    <div class="tag-group-cards">
      ${tasks.map(t => makeCardHTML(t, true)).join('')}
    </div>`;
  group.querySelectorAll('.card').forEach(card => bindCardEvents(card));
  return group;
}

// ── Card HTML ─────────────────────────────────────────────────────────────────

function makeCardHTML(t, showColumn) {
  const now = new Date();
  const overdue = t.deadline && new Date(t.deadline) < now ? 'overdue' : '';
  const colName = showColumn ? (state.columns.find(c=>c.id===t.column_id)?.name || '') : '';
  const tagsHTML = (t.tags||[]).map(tag =>
    `<span class="badge badge-tag" data-tag="${esc(tag)}">#${esc(tag)}</span>`
  ).join('');
  return `
    <div class="card" data-id="${t.id}" draggable="true">
      <button class="card-edit" title="Редактировать">✏️</button>
      <button class="card-del" title="Удалить">✕</button>
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-meta">
        <span class="pdot p${t.priority}"></span>
        <span class="badge badge-proj" style="border-left:3px solid ${t.project_color}">${esc(t.project_name)}</span>
        ${t.deadline ? `<span class="badge badge-dl ${overdue}">📅 ${esc(t.deadline)}</span>` : ''}
        ${t.delegated_to ? `<span class="badge badge-del">👤 ${esc(t.delegated_to)}</span>` : ''}
        ${showColumn && colName ? `<span class="badge badge-col">⬛ ${esc(colName)}</span>` : ''}
        ${tagsHTML}
      </div>
    </div>`;
}

function bindCardEvents(card) {
  const id = parseInt(card.dataset.id);
  card.addEventListener('dragstart', e => { dragTaskId=id; e.dataTransfer.effectAllowed='move'; setTimeout(()=>card.classList.add('dragging'),0); });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragTaskId=null; });

  card.querySelector('.card-del').addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm('Удалить задачу?')) return;
    await fetch(`${API}/tasks/${id}`, {method:'DELETE'});
    toast('Удалено');
    load();
  });

  card.querySelector('.card-edit').addEventListener('click', e => {
    e.stopPropagation();
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    openEditModal(task);
  });

  // Клик по тегу — фильтрация
  card.querySelectorAll('.badge-tag').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      activeTag = b.dataset.tag;
      renderTagFilters();
      render();
    });
  });
}

function makeAddColBtn() {
  const btn = document.createElement('button');
  btn.className = 'add-col-btn';
  btn.innerHTML = `<span style="font-size:18px">+</span> Новая колонка`;
  btn.addEventListener('click', () => openModal('create'));
  return btn;
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal(mode, col=null) {
  modalMode=mode; modalEditId=col?.id??null; selectedColor=col?.color??COLORS[0];
  document.getElementById('modalTitle').textContent = mode==='edit' ? 'Переименовать' : 'Новая колонка';
  document.getElementById('colName').value = col?.name??'';
  const ce = document.getElementById('modalColors');
  ce.innerHTML = COLORS.map(c=>`<div class="modal-swatch${c===selectedColor?' active':''}" style="background:${c}" data-color="${c}"></div>`).join('');
  ce.querySelectorAll('.modal-swatch').forEach(sw=>{
    sw.addEventListener('click',()=>{ selectedColor=sw.dataset.color; ce.querySelectorAll('.modal-swatch').forEach(s=>s.classList.remove('active')); sw.classList.add('active'); });
  });
  document.getElementById('colModal').classList.add('open');
  setTimeout(()=>document.getElementById('colName').focus(),50);
}

function closeModal(){ document.getElementById('colModal').classList.remove('open'); }
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('colModal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('modalSave').addEventListener('click', async()=>{
  const name = document.getElementById('colName').value.trim();
  if(!name) return;
  if(modalMode==='create'){
    await fetch(`${API}/columns`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,color:selectedColor})});
    toast('Колонка создана');
  } else {
    await fetch(`${API}/columns/${modalEditId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,color:selectedColor})});
    toast('Сохранено');
  }
  closeModal(); load();
});
document.getElementById('colName').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('modalSave').click(); if(e.key==='Escape') closeModal(); });

async function deleteColumn(col) {
  const tasks = state.tasks.filter(t=>t.column_id===col.id);
  const msg = tasks.length ? `В колонке "${col.name}" ${tasks.length} задач. Они будут удалены. Продолжить?` : `Удалить колонку "${col.name}"?`;
  if(!confirm(msg)) return;
  await fetch(`${API}/columns/${col.id}`,{method:'DELETE'});
  toast('Колонка удалена'); load();
}

// ── Add task ──────────────────────────────────────────────────────────────────

document.getElementById('addForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if(!text) return;
  await fetch(`${API}/tasks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  input.value='';
  toast('✅ Задача создана');
  load();
});

// ── Helpers ───────────────────────────────────────────────────────────────────

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Edit task modal ───────────────────────────────────────────────────────────

let editTaskId = null;
let editTags = [];
let editPriority = 2;

function openEditModal(task) {
  editTaskId = task.id;
  editTags = [...(task.tags || [])];
  editPriority = task.priority || 2;

  document.getElementById('editTitle').value = task.title || '';
  document.getElementById('editNotes').value = task.notes || '';
  document.getElementById('editDeadline').value = task.deadlineRaw || '';

  renderEditTags();
  renderPriorityBtns();

  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editTitle').focus(), 50);
}

function renderEditTags() {
  const wrap = document.getElementById('tagsWrap');
  const input = document.getElementById('tagsInput');
  wrap.innerHTML = '';
  editTags.forEach(tag => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.innerHTML = `#${esc(tag)} <button data-tag="${esc(tag)}">×</button>`;
    pill.querySelector('button').addEventListener('click', () => {
      editTags = editTags.filter(t => t !== tag);
      renderEditTags();
    });
    wrap.appendChild(pill);
  });
  wrap.appendChild(input);
  wrap.addEventListener('click', () => input.focus());
}

function renderPriorityBtns() {
  document.querySelectorAll('.priority-btn').forEach(btn => {
    const p = parseInt(btn.dataset.p);
    btn.className = 'priority-btn' + (p === editPriority ? ` active-${p}` : '');
    btn.addEventListener('click', () => { editPriority = p; renderPriorityBtns(); });
  });
}

document.getElementById('tagsInput').addEventListener('keydown', e => {
  const val = e.target.value.trim().replace(/^#/, '');
  if ((e.key === 'Enter' || e.key === ',') && val) {
    e.preventDefault();
    if (!editTags.includes(val)) editTags.push(val);
    e.target.value = '';
    renderEditTags();
  }
  if (e.key === 'Backspace' && !e.target.value && editTags.length) {
    editTags.pop();
    renderEditTags();
  }
});

document.getElementById('editCancel').addEventListener('click', () => document.getElementById('editModal').classList.remove('open'));
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) e.target.classList.remove('open'); });

document.getElementById('editSave').addEventListener('click', async () => {
  const title = document.getElementById('editTitle').value.trim();
  if (!title) return;
  await fetch(`${API}/tasks/${editTaskId}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      title,
      notes: document.getElementById('editNotes').value.trim(),
      priority: editPriority,
      deadline: document.getElementById('editDeadline').value || '',
      tags: editTags,
    })
  });
  document.getElementById('editModal').classList.remove('open');
  toast('✅ Сохранено');
  load();
});

// ── Current user ─────────────────────────────────────────────────────────────

async function loadMe() {
  try {
    const me = await fetch('/api/me').then(r => {
      if (r.status === 401) { window.location.href = '/login'; return null; }
      return r.json();
    });
    if (!me) return;
    const info = document.getElementById('userInfo');
    const avatar = document.getElementById('userAvatar');
    const name = document.getElementById('userName');
    if (me.avatar) { avatar.src = me.avatar; avatar.style.display = ''; }
    else { avatar.style.display = 'none'; }
    name.textContent = me.name || me.email || '';
    info.style.display = 'flex';

    if (me.telegram_linked) {
      document.getElementById('tgLinked').style.display = 'flex';
      document.getElementById('linkTgBtn').style.display = 'none';
    } else {
      document.getElementById('tgLinked').style.display = 'none';
      document.getElementById('linkTgBtn').style.display = '';
    }
  } catch(e) { /* silent */ }
}

document.getElementById('linkTgBtn').addEventListener('click', async () => {
  const res = await fetch(`${API}/link/telegram`, {method: 'POST'});
  if (!res.ok) { toast('❌ Ошибка генерации токена'); return; }
  const data = await res.json();
  const cmd = data.command;
  document.getElementById('linkCmd').textContent = cmd;
  document.getElementById('linkTgModal').classList.add('open');
});

document.getElementById('linkCmd').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('linkCmd').textContent);
  toast('📋 Скопировано!');
});

document.getElementById('linkTgClose').addEventListener('click', () => {
  document.getElementById('linkTgModal').classList.remove('open');
  loadMe(); // обновить статус привязки
});
document.getElementById('linkTgModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    e.target.classList.remove('open');
    loadMe();
  }
});

loadMe();
load();
setInterval(load, 30000);
</script>
