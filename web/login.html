<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Todo Board</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#1a1d2e;border:1px solid #2d3148;border-radius:16px;padding:40px 36px;width:340px;text-align:center}
    .logo{font-size:40px;margin-bottom:16px}
    h1{font-size:22px;font-weight:700;color:#a78bfa;margin-bottom:8px}
    p{font-size:14px;color:#64748b;margin-bottom:32px;line-height:1.55}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:#fff;color:#1e1e1e;border:none;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s,box-shadow .15s}
    .google-btn:hover{background:#f1f3f4;box-shadow:0 2px 12px #00000030}
    .google-btn svg{flex-shrink:0}
    .footer{margin-top:24px;font-size:12px;color:#4a5280}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📋</div>
    <h1>Todo Board</h1>
    <p>Личная доска задач.<br>Войдите через Google, чтобы начать.</p>
    <a href="/auth/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.962H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.038l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Войти через Google
    </a>
    <div class="footer">Только для авторизованных пользователей</div>
  </div>
</body>
</html>
